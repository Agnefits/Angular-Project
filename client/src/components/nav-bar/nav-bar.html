<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-primary" routerLink="/"> Store </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a></li>
        <li class="nav-item"><a class="nav-link" routerLink="/app/products" routerLinkActive="active">Products</a></li>
        <li class="nav-item"><a class="nav-link" routerLink="/app/favorites" routerLinkActive="active">Favorites <span class="badge text-bg-danger">{{ favorites.count() }}</span></a></li>
        <li class="nav-item"><a class="nav-link" routerLink="/app/cart" routerLinkActive="active">Cart <span class="badge text-bg-primary">{{ cart.count() }}</span></a></li>
        <li class="nav-item"><a class="nav-link" routerLink="/app/dashboard" routerLinkActive="active">Dashboard</a></li>
        <li class="nav-item" *ngIf="auth.isAdmin()"><a class="nav-link" routerLink="/app/admin" routerLinkActive="active">Admin</a></li>
      </ul>
      <div class="d-flex align-items-center gap-2">
        <ng-container *ngIf="auth.isLoggedIn(); else guestLinks">
          <span class="badge text-bg-primary text-capitalize">{{ auth.role() || 'user' }}</span>
          <button class="btn btn-outline-danger btn-sm" type="button" (click)="logout()">Logout</button>
        </ng-container>
        <ng-template #guestLinks>
          <a class="btn btn-outline-primary btn-sm" routerLink="/login">Login</a>
          <a class="btn btn-primary btn-sm" routerLink="/signup">Signup</a>
        </ng-template>
      </div>
    </div>
  </div>
</nav>
